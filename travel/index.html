<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel – Hwijae Son</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    #globe-wrap {
      width: 100%;
      height: 500px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 32px;
      background: #070d1a;
      position: relative;
    }

    .globe-hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: rgba(255,255,255,.45);
      pointer-events: none;
      white-space: nowrap;
    }

    .trip-cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .trip-card {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      padding: 16px 20px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg-alt);
      cursor: pointer;
      transition: box-shadow .15s, border-color .15s;
    }

    .trip-card:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      border-color: #bfdbfe;
    }

    .trip-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }

    .trip-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }

    .trip-body { flex: 1; }

    .trip-header {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 3px;
    }

    .trip-event {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--navy);
    }

    .trip-date {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .trip-location {
      font-size: 0.84rem;
      color: var(--accent);
      margin-bottom: 5px;
    }

    .trip-talk {
      font-size: 0.87rem;
      color: var(--text);
      line-height: 1.5;
    }

    .trip-type-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 99px;
      margin-left: 4px;
      vertical-align: middle;
    }

    @media (max-width: 640px) {
      #globe-wrap { height: 360px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-brand" href="/">Hwijae Son</a>
    <a href="/">Home</a>
    <a href="/publications/">Publications</a>
    <a href="/projects/">Projects</a>
    <a href="/students/">Students</a>
    <a href="/talks/">Talks</a>
    <a href="/travel/" class="active">Travel</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Travel</h1>
    <p style="color:var(--muted);font-size:0.92rem;margin-top:6px;">
      International conferences &amp; workshops — click a marker or a card
    </p>
  </div>

  <div id="globe-wrap">
    <span class="globe-hint">🖱 drag to rotate · scroll to zoom · click a pin</span>
  </div>

  <div class="section" style="margin-top:0;">
    <h2>Visits</h2>
    <div class="trip-cards" id="trip-list"></div>
  </div>
</main>

<footer>
  &copy; 2026 Hwijae Son · Konkuk University
</footer>

<script src="https://unpkg.com/globe.gl@2.30.0/dist/globe.gl.min.js"></script>
<script>
/* ══════════════════════════════════════════
   TRIP DATA  — add / edit entries here
   type: 'conf' | 'workshop' | 'talk'
══════════════════════════════════════════ */
const trips = [
  {
    id: 'iciam2031',
    name: 'ICIAM 2031',
    city: 'Tokyo, Japan',
    lat: 35.6762, lng: 139.6503,
    date: '2031.07',
    talk: '',
    type: 'conf',
  },
  {
    id: 'wccm2026',
    name: 'WCCM-ECCOMAS 2026',
    city: 'Munich, Germany',
    lat: 48.1351, lng: 11.5820,
    date: '2026.07',
    talk: '',
    type: 'conf',
  },
  {
    id: 'icml2026',
    name: 'ICML 2026',
    city: 'Hawaii, USA',
    lat: 21.3069, lng: -157.8583,
    date: '2026.07',
    talk: '',
    type: 'conf',
  },
  {
    id: 'apcom2025',
    name: 'APCOM-ACCM 2025',
    city: 'Brisbane, Australia',
    lat: -27.4698, lng: 153.0251,
    date: '2025.12',
    talk: 'Physics-informed Deep Inverse Operator Networks for solving PDE inverse problems',
    type: 'conf',
  },
  {
    id: 'a3_2025',
    name: '8th Joint Conference of A3 Foresight Program',
    city: 'Yanji, China',
    lat: 42.9066, lng: 129.5113,
    date: '2025.08',
    talk: 'Sobolev acceleration for neural networks',
    type: 'workshop',
  },
  {
    id: 'siam2025',
    name: 'SIAM Annual Meeting 2025',
    city: 'Montreal, Canada',
    lat: 45.5017, lng: -73.5673,
    date: '2025.07',
    talk: 'Physics-informed Deep Inverse Operator Networks for solving PDE inverse problems',
    type: 'conf',
  },
  {
    id: 'iclr2025',
    name: 'ICLR 2025',
    city: 'Singapore',
    lat: 1.3521, lng: 103.8198,
    date: '2025.04',
    talk: 'Physics-Informed Deep Inverse Operator Networks for Solving PDE Inverse Problems',
    type: 'conf',
  },
  {
    id: 'vk2025',
    name: '3rd Vietnam–Korea Joint Workshop on Selected Topics in Mathematics',
    city: 'Da Nang, Vietnam',
    lat: 16.0544, lng: 108.2022,
    date: '2025.01',
    talk: 'Physics-informed machine learning for inverse problems',
    type: 'workshop',
  },
  {
    id: 'a3_2024',
    name: '7th Joint Conference of A3 Foresight Program',
    city: 'Wuhan, China',
    lat: 30.5928, lng: 114.3055,
    date: '2024.09',
    talk: 'Physics-informed machine learning for inverse problems',
    type: 'workshop',
  },
];

/* ── Color / label maps ── */
const COLOR = { conf: '#2563eb', workshop: '#10b981', talk: '#f59e0b' };
const BADGE_BG  = { conf: '#dbeafe', workshop: '#d1fae5', talk: '#fef3c7' };
const BADGE_FG  = { conf: '#1e40af', workshop: '#065f46', talk: '#92400e' };
const LABEL_STR = { conf: 'Conference', workshop: 'Workshop', talk: 'Invited Talk' };

/* ── Globe ── */
const globeEl = document.getElementById('globe-wrap');

const myGlobe = Globe()
  .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
  .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
  .pointsData(trips)
  .pointLat('lat')
  .pointLng('lng')
  .pointColor(d => COLOR[d.type])
  .pointRadius(0.55)
  .pointAltitude(0.01)
  .pointLabel(d => `
    <div style="background:#1a2e4a;color:#fff;padding:8px 12px;border-radius:8px;
                font-size:13px;max-width:200px;line-height:1.45;pointer-events:none;">
      <strong>${d.name}</strong><br/>
      <span style="color:#93c5fd">📍 ${d.city}</span><br/>
      <span style="color:#cbd5e1">${d.date}</span>
    </div>`)
  .onPointClick(d => {
    myGlobe.controls().autoRotate = false;
    myGlobe.pointOfView({ lat: d.lat, lng: d.lng, altitude: 1.6 }, 900);
    focusCard(d.id);
  })
  (globeEl);

myGlobe.controls().autoRotate = true;
myGlobe.controls().autoRotateSpeed = 0.35;
myGlobe.pointOfView({ altitude: 2.4 });

/* ── Cards ── */
const listEl = document.getElementById('trip-list');

trips.forEach(trip => {
  const card = document.createElement('div');
  card.className = 'trip-card';
  card.id = 'card-' + trip.id;
  card.innerHTML = `
    <div class="trip-dot" style="background:${COLOR[trip.type]}"></div>
    <div class="trip-body">
      <div class="trip-header">
        <span class="trip-event">${trip.name}</span>
        <span class="trip-type-badge" style="background:${BADGE_BG[trip.type]};color:${BADGE_FG[trip.type]}">${LABEL_STR[trip.type]}</span>
        <span class="trip-date">${trip.date}</span>
      </div>
      <div class="trip-location">📍 ${trip.city}</div>
      <div class="trip-talk">${trip.talk}</div>
    </div>`;

  card.addEventListener('click', () => {
    myGlobe.controls().autoRotate = false;
    myGlobe.pointOfView({ lat: trip.lat, lng: trip.lng, altitude: 1.6 }, 900);
    focusCard(trip.id);
  });

  listEl.appendChild(card);
});

function focusCard(id) {
  document.querySelectorAll('.trip-card').forEach(c => c.classList.remove('active'));
  const el = document.getElementById('card-' + id);
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}
</script>

</body>
</html>
